# ============================================================
#  Render Blueprint  —  one-click deploy of the FastAPI backend
#  + a managed PostgreSQL instance.
#
#  Usage:
#    1. Sign in at https://render.com (free tier)
#    2. New → Blueprint → connect this GitHub repo
#    3. Render reads this file and provisions both services
#    4. Add a JWT_SECRET env var (random string ≥32 chars)
#    5. (Optional) Add GROQ_API_KEY for AI question generation
# ============================================================

databases:
  - name: interview-prep-db
    plan: free
    databaseName: interview_prep
    user: interview_admin

services:
  - type: web
    name: interview-prep-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: interview-prep-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true        # Render auto-generates a strong random
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app
      - key: WHISPER_MODEL
        value: tiny.en
      - key: ADMIN_EMAILS
        sync: false                # set this manually in the dashboard
      - key: GROQ_API_KEY
        sync: false                # optional, manual
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /api/health
    autoDeploy: true
